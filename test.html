<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Portrait Video Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #111;
            color: white;
            font-family: sans-serif;
        }

        h2 {
            text-align: center;
            padding: 16px;
        }

        .tv-frame {
            width: 800px;
            height: 450px;
            margin: 20px auto;
            background: black;
            position: relative;
            border: 3px solid #333;
            border-radius: 8px;
            overflow: hidden;
        }

        .tv-frame video {
            width: 100%;
            height: 100%;
            background: black;
        }

        .label {
            position: absolute;
            top: 8px;
            left: 8px;
            background: rgba(0, 0, 0, 0.7);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 13px;
        }

        .contain video {
            object-fit: contain;
        }

        .cover video {
            object-fit: cover;
        }

        .fill video {
            object-fit: fill;
        }
    </style>
</head>

<body>
    <h2>Portrait Video (9:16) on a 16:9 Screen</h2>

    <div class="tv-frame contain">
        <span class="label">✅ object-fit: contain (correct — letterboxed)</span>
        <video src="720p.mp4" autoplay muted loop></video>
    </div>

    <div class="tv-frame cover">
        <span class="label">❌ object-fit: cover (cropped/zoomed)</span>
        <video src="720p.mp4" autoplay muted loop></video>
    </div>

    <div class="tv-frame fill">
        <span class="label">❌ object-fit: fill (stretched)</span>
        <video src="720p.mp4" autoplay muted loop></video>
    </div>
</body>

</html>
