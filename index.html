<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: black;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        /* Blurred background */
        #bg {
            position: absolute;
            inset: 0;
            background: black;
            background-size: cover;
            background-position: center;
            filter: blur(40px) brightness(0.3);
            transform: scale(1.2);
            z-index: 0;
        }

        /* Portrait video centered */
        cast-media-player {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            height: 100vh;
            width: auto;
            aspect-ratio: 9/16;
            /* ✅ portrait */
            z-index: 1;
        }
    </style>
</head>

<body>
    <div id="container">
        <div id="bg"></div>
        <cast-media-player></cast-media-player>
    </div>

    <script>
        const context = cast.framework.CastReceiverContext.getInstance();
        const playerManager = context.getPlayerManager();

        // ✅ Set thumbnail as blurred background
        playerManager.addEventListener(
            cast.framework.events.EventType.PLAYER_LOADING,
            () => {
                const media = playerManager.getMediaInformation();
                if (media?.metadata?.images?.[0]?.url) {
                    document.getElementById('bg').style.backgroundImage =
                        `url(${media.metadata.images[0].url})`;
                }
            }
        );

        context.start();
    </script>
</body>

</html>
