<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: black;
            overflow: hidden;
        }

        cast-media-player {
            width: 100vw;
            height: 100vh;
            --theme-hue: 0;
            --progress-color: white;
            --splash-image: none;
        }

        video::cue {
            background: rgba(0, 0, 0, 0.6) !important;
            color: white !important;
            font-size: 20px !important;
            line-height: normal !important;
        }
    </style>
</head>

<body>
    <cast-media-player></cast-media-player>

    <script>
        const context = cast.framework.CastReceiverContext.getInstance();
        const playerManager = context.getPlayerManager();

        function findVideo() {
            const cmp = document.querySelector('cast-media-player');
            if (cmp && cmp.shadowRoot) {
                const v = cmp.shadowRoot.querySelector('video');
                if (v) return v;
            }
            return document.querySelector('video');
        }

        function setupVideoListeners() {
            const video = findVideo();
            if (!video || video.hasAttribute('listener-added')) return;

            video.setAttribute('listener-added', 'true');

            video.onended = function () {

                playerManager.stop();

                playerManager.broadcastStatus(true);
            };

            // video.onended = function () {

            //     const queue = playerManager.getQueueManager();
            //     if (queue && !queue.getNextItemId()) {
            //         playerManager.broadcastStatus(true);
            //     }
            //     else {
            //         playerManager.stop();
            //         playerManager.broadcastStatus(true);
            //     }
            // };

        }

        function injectSubtitle(vttUrl, langName) {
            const video = findVideo();
            if (!video) return;

            const oldTracks = video.querySelectorAll('track');
            oldTracks.forEach(t => t.remove());

            const track = document.createElement('track');
            track.kind = 'subtitles';
            track.label = langName || 'Mongolian';
            track.srclang = 'mn';
            track.src = vttUrl;
            track.default = true;

            video.appendChild(track);

            if (video.textTracks && video.textTracks.length > 0) {
                video.textTracks[0].mode = 'showing';
            }
            console.log('[SUBS] Injected VTT:', vttUrl);
        }

        playerManager.setMessageInterceptor(
            cast.framework.messages.MessageType.LOAD,
            request => {
                if (request.media && request.media.tracks && request.media.tracks.length > 0) {
                    const subTrack = request.media.tracks[0];
                    const vttUrl = subTrack.trackContentId;
                    const langName = subTrack.name;

                    setTimeout(() => injectSubtitle(vttUrl, langName), 1500);
                }
                return request;
            }
        );

        let isPortrait = false;
        let fixInterval = null;

        function fixPortraitVideo() {
            const video = findVideo();
            if (!video) return;

            const vw = video.videoWidth;
            const vh = video.videoHeight;
            if (!vw || !vh) return;

            if (vh > vw) {
                isPortrait = true;
                const screenW = window.innerWidth || 1920;
                const screenH = window.innerHeight || 1080;
                const ratio = vw / vh;
                const displayH = screenH;
                const displayW = Math.round(screenH * ratio);
                const leftOffset = Math.round((screenW - displayW) / 2);

                video.style.setProperty('width', displayW + 'px', 'important');
                video.style.setProperty('height', displayH + 'px', 'important');
                video.style.setProperty('position', 'absolute', 'important');
                video.style.setProperty('top', '0px', 'important');
                video.style.setProperty('left', leftOffset + 'px', 'important');
                video.style.setProperty('object-fit', 'fill', 'important');

                const cmp = document.querySelector('cast-media-player');
                if (cmp && cmp.shadowRoot && !cmp.shadowRoot.querySelector('#portrait-fix')) {
                    const style = document.createElement('style');
                    style.id = 'portrait-fix';
                    style.textContent = 'video { width: ' + displayW + 'px !important; height: ' + displayH + 'px !important; position: absolute !important; top: 0 !important; left: ' + leftOffset + 'px !important; object-fit: fill !important; }';
                    cmp.shadowRoot.appendChild(style);
                }
            } else {
                isPortrait = false;
            }
        }

        fixInterval = setInterval(fixPortraitVideo, 200);

        playerManager.addEventListener(
            cast.framework.events.EventType.PLAYER_LOAD_COMPLETE,
            () => {
                console.log('[EVENT] PLAYER_LOAD_COMPLETE');
                setupVideoListeners();
                fixPortraitVideo();
            }
        );

        const options = new cast.framework.CastReceiverOptions();

        options.supportedCommands =
            cast.framework.messages.Command.ALL_BASIC_MEDIA |
            cast.framework.messages.Command.QUEUE_NEXT |
            cast.framework.messages.Command.QUEUE_PREV;

        context.start();
        console.log('[RECEIVER] Started');
    </script>
</body>

</html>
