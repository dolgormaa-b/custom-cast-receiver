<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100vw;
            height: 100vh;
            background: black;
            overflow: hidden;
        }

        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Blurred background */
        #bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            filter: blur(40px) brightness(0.3);
            transform: scale(1.2);
            z-index: 0;
        }

        /* ✅ Raw video tag — full control */
        #player {
            position: relative;
            z-index: 1;
            height: 100vh;
            width: auto;
            max-width: 100vw;
            object-fit: contain;
            /* ✅ no stretching */
            background: transparent;
        }
    </style>
</head>

<body>
    <div id="container">
        <div id="bg"></div>
        <video id="player" autoplay playsinline></video>
    </div>

    <script>
        const context = cast.framework.CastReceiverContext.getInstance();
        const playerManager = context.getPlayerManager();

        // ✅ Use custom playback with raw video element
        const playbackConfig = new cast.framework.PlaybackConfig();

        playerManager.setMediaElement(document.getElementById('player'));

        playerManager.addEventListener(
            cast.framework.events.EventType.PLAYER_LOADING,
            () => {
                const media = playerManager.getMediaInformation();
                console.log('Loading media:', media);

                // Set blurred background from thumbnail
                if (media?.metadata?.images?.[0]?.url) {
                    document.getElementById('bg').style.backgroundImage =
                        `url(${media.metadata.images[0].url})`;
                }
            }
        );

        playerManager.addEventListener(
            cast.framework.events.EventType.PLAYER_LOAD_COMPLETE,
            () => {
                console.log('✅ Player load complete');
            }
        );

        context.start();
    </script>
</body>

</html>
