<!DOCTYPE html>
<html>

<head>
    <style type="text/css">
        html,
        body {
            height: 100%;
            width: 100%;
            margin: 0;
            background-color: black;
            overflow: hidden;
        }

        /* Style the player to fill the screen while maintaining aspect ratio */
        cast-media-player {
            --theme-hue: 200;
            /* Customize color */
            --player-background-color: black;
            width: 100%;
            height: 100%;
        }

        cast-media-player {
            --player-background-color: black;
            /* Ensure the media fits vertically and centers */
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
    <!-- Include CAF Receiver Library -->
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
</head>

<body>
    <!-- The Cast Media Player Element -->
    <cast-media-player></cast-media-player>
    <script>
        const context = cast.framework.CastReceiverContext.getInstance();
        context.start();
    </script>
</body>

</html>
