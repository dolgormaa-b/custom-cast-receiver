<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100vw;
            height: 100vh;
            background: black;
            overflow: hidden;
        }

        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        /* 🔥 Blurred background */
        #bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            filter: blur(40px) brightness(0.35);
            transform: scale(1.2);
            z-index: 0;
        }

        /* ✅ Video (NO STRETCH EVER) */
        video {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);

            max-width: 100vw;
            max-height: 100vh;

            width: auto;
            height: auto;

            object-fit: contain;
            background: transparent;
            z-index: 1;
        }
    </style>
</head>

<body>
    <div id="container">
        <div id="bg"></div>
        <video id="video" autoplay playsinline></video>
    </div>

    <script>
        const context = cast.framework.CastReceiverContext.getInstance();
        const playerManager = context.getPlayerManager();

        const video = document.getElementById('video');
        const bg = document.getElementById('bg');

        // 🚀 FULL MANUAL PLAYBACK (NO CAF CONTROL)
        playerManager.setMessageInterceptor(
            cast.framework.messages.MessageType.LOAD,
            request => {
                console.log("📥 LOAD:", request);

                const url = request.media.contentUrl;

                // Set video manually
                video.src = url;
                video.load();
                video.play();

                // Background image
                const imageUrl = request?.media?.metadata?.images?.[0]?.url;
                if (imageUrl) {
                    bg.style.backgroundImage = `url(${imageUrl})`;
                }

                return null; // 🚨 THIS disables CAF default player (important)
            }
        );

        context.start();
    </script>
</body>

</html>
