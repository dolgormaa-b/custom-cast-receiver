<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Portrait Video Receiver</title>
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>

    <style type="text/css">
        html,
        body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            background-color: black;
            overflow: hidden;
        }

        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        /* 1. Official CAF Player Element */
        cast-media-player {
            width: 100%;
            height: 100%;
            --player-background-color: transparent;
            z-index: 2;
        }

        /* 2. Force the internal video tag to NOT stretch */
        /* Note: CAF puts the video tag in a shadow DOM, 
           so we target it globally with !important */
        video {
            object-fit: contain !important;
            width: 100% !important;
            height: 100% !important;
        }

        /* 3. Optional: The "Blurred Wings" effect for portrait videos */
        #background-blur {
            position: absolute;
            top: -5%;
            left: -5%;
            width: 110%;
            height: 110%;
            background-size: cover;
            background-position: center;
            filter: blur(40px) brightness(0.3);
            z-index: 1;
            transition: background-image 0.8s ease-in-out;
        }
    </style>
</head>

<body>
    <div id="container">
        <div id="background-blur"></div>
        <cast-media-player></cast-media-player>
    </div>

    <script>
        const context = cast.framework.CastReceiverContext.getInstance();
        const playerManager = context.getPlayerManager();
        const bgBlur = document.getElementById('background-blur');

        // --- Interceptors ---

        playerManager.setMessageInterceptor(
            cast.framework.messages.MessageType.LOAD,
            loadRequestData => {
                // Ensure we have metadata and images for the blurred background
                if (loadRequestData.media && loadRequestData.media.metadata) {
                    const images = loadRequestData.media.metadata.images;
                    if (images && images.length > 0) {
                        bgBlur.style.backgroundImage = `url(${images[0].url})`;
                    }
                }

                // Force video to buffered mode for smoother aspect ratio calculation
                if (loadRequestData.media) {
                    loadRequestData.media.streamType = cast.framework.messages.StreamType.BUFFERED;
                }

                return loadRequestData;
            }
        );

        // --- Event Listeners to prevent Stretching ---

        // This triggers as soon as the video metadata (dimensions) are known
        playerManager.addEventListener(
            cast.framework.events.EventType.METADATA_LOADED,
            () => {
                const videoElement = document.querySelector('video');
                if (videoElement) {
                    // Force the object-fit again just in case the TV tried to override
                    videoElement.style.setProperty('object-fit', 'contain', 'important');
                    console.log("🎬 Metadata loaded: Forcing 'contain' fit.");
                }
            }
        );

        // Safety check when playback actually starts
        playerManager.addEventListener(
            cast.framework.events.EventType.PLAYER_STATE_CHANGED,
            event => {
                if (event.playerState === 'PLAYING') {
                    const videoElement = document.querySelector('video');
                    if (videoElement) {
                        videoElement.style.objectFit = 'contain';
                    }
                }
            }
        );

        // Start the receiver
        const options = new cast.framework.CastReceiverOptions();
        // Prevents the TV from sleeping if no input is received for a while
        options.disableIdleTimeout = true;

        context.start(options);
    </script>
</body>

</html>
