<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: black;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        cast-media-player {
            width: 100vw;
            height: 100vh;
            --theme-hue: 0;
            --progress-color: white;
            --splash-image: none;
        }

        /* CSS fallback — works if shadow DOM exposes ::part */
        cast-media-player::part(media-element) {
            object-fit: contain !important;
            background: black;
        }

        /* Also target any video that leaks into the light DOM */
        video {
            object-fit: contain !important;
            width: 100% !important;
            height: 100% !important;
        }
    </style>
</head>

<body>
    <cast-media-player></cast-media-player>

    <script>
        const context = cast.framework.CastReceiverContext.getInstance();
        const playerManager = context.getPlayerManager();

        /**
         * Force object-fit: contain on the actual <video> element
         * so portrait videos are letterboxed, not stretched.
         */
        function fixVideoFit() {
            // Try shadow DOM first
            const player = document.querySelector('cast-media-player');
            if (player && player.shadowRoot) {
                const video = player.shadowRoot.querySelector('video');
                if (video) {
                    video.style.objectFit = 'contain';
                    video.style.width = '100%';
                    video.style.height = '100%';
                    video.style.background = 'black';
                    console.log('[FIX] Applied object-fit:contain via shadowRoot');
                    return;
                }
            }

            // Fallback: find any <video> in the document
            const video = document.querySelector('video');
            if (video) {
                video.style.objectFit = 'contain';
                video.style.width = '100%';
                video.style.height = '100%';
                video.style.background = 'black';
                console.log('[FIX] Applied object-fit:contain via document query');
            }
        }

        // Apply fix when media starts playing
        playerManager.addEventListener(
            cast.framework.events.EventType.PLAYER_LOAD_COMPLETE,
            (event) => {
                console.log('PLAYER_LOAD_COMPLETE:', event);
                fixVideoFit();
                // Retry after a short delay in case the element isn't ready yet
                setTimeout(fixVideoFit, 500);
                setTimeout(fixVideoFit, 1500);
            }
        );

        playerManager.addEventListener(
            cast.framework.events.EventType.MEDIA_STATUS,
            (event) => {
                console.log('MEDIA STATUS:', event);
            }
        );

        context.start();
    </script>
</body>

</html>
