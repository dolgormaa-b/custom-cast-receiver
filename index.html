<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: black;
            overflow: hidden;
        }

        cast-media-player {
            width: 100vw;
            height: 100vh;
            --progress-color: white;
            --splash-image: none;
        }

        video::cue {
            background: rgba(0, 0, 0, 0.6) !important;
            color: white !important;
            font-size: 20px !important;
        }
    </style>
</head>

<body>
    <cast-media-player></cast-media-player>

    <script>
        const context = cast.framework.CastReceiverContext.getInstance();
        const playerManager = context.getPlayerManager();

        // 1. Видео элементыг Shadow DOM-оос хайх
        function findVideo() {
            const cmp = document.querySelector('cast-media-player');
            if (cmp && cmp.shadowRoot) {
                return cmp.shadowRoot.querySelector('video') || document.querySelector('video');
            }
            return document.querySelector('video');
        }

        // 2. Хадмалыг цэвэрлэх
        function clearSubtitles() {
            const video = findVideo();
            if (!video) return;
            const oldTracks = video.querySelectorAll('track');
            oldTracks.forEach(t => t.remove());
            if (video.textTracks) {
                for (let i = 0; i < video.textTracks.length; i++) {
                    video.textTracks[i].mode = 'disabled';
                }
            }
            console.log('[SUBS] Cleared');
        }

        // 3. Хадмал шахах (Unique function)
        function injectSubtitle(vttUrl, langName) {
            const video = findVideo();
            if (!video || !vttUrl) return;

            clearSubtitles();

            const track = document.createElement('track');
            track.kind = 'subtitles';
            track.label = langName || 'Mongolian';
            track.srclang = 'mn';
            track.src = vttUrl + '?t=' + Date.now(); // Cache bust
            track.default = true;
            video.appendChild(track);

            // Идэвхжүүлэх
            setTimeout(() => {
                if (video.textTracks && video.textTracks.length > 0) {
                    video.textTracks[0].mode = 'showing';
                }
                console.log('[SUBS] Activated:', vttUrl);
            }, 500);
        }

        // 4. LOAD Interceptor - Хамгийн чухал хэсэг
        playerManager.setMessageInterceptor(
            cast.framework.messages.MessageType.LOAD,
            request => {
                console.log('📥 Load Request Received');

                // Дараагийн видео руу ороход хуучин хадмалыг цэвэрлэх
                clearSubtitles();

                const tracks = request?.media?.tracks;
                if (tracks && Array.isArray(tracks) && tracks.length > 0) {
                    try {
                        const subTrack = tracks[0];
                        const vttUrl = subTrack.trackContentId;
                        const langName = subTrack.name || 'Mongolian';

                        if (vttUrl) {
                            // Видео ачаалж дууссаны дараа хадмалыг шахах delay
                            setTimeout(() => injectSubtitle(vttUrl, langName), 2000);
                        }
                    } catch (e) {
                        console.error("[SUBS] Interceptor error:", e);
                    }
                }
                return request; // ЗААВАЛ буцаах
            }
        );

        // 5. MEDIA_CHANGED - Дарааллаар тоглох үед дуудагдана
        playerManager.addEventListener(
            cast.framework.events.EventType.MEDIA_CHANGED,
            () => {
                console.log('[EVENT] MEDIA_CHANGED');
                // Portrait fix-ийг шинэ видео бүрт цэвэрлэх
                const cmp = document.querySelector('cast-media-player');
                if (cmp?.shadowRoot) {
                    const oldFix = cmp.shadowRoot.querySelector('#portrait-fix');
                    if (oldFix) oldFix.remove();
                }
            }
        );

        // 6. Portrait Video Fix
        function fixPortraitVideo() {
            const video = findVideo();
            if (!video) return;

            const vw = video.videoWidth;
            const vh = video.videoHeight;
            if (!vw || !vh) return;

            if (vh > vw) {
                const screenW = window.innerWidth || 1920;
                const screenH = window.innerHeight || 1080;
                const ratio = vw / vh;
                const displayW = Math.round(screenH * ratio);
                const leftOffset = Math.round((screenW - displayW) / 2);

                const cmp = document.querySelector('cast-media-player');
                if (cmp?.shadowRoot && !cmp.shadowRoot.querySelector('#portrait-fix')) {
                    const style = document.createElement('style');
                    style.id = 'portrait-fix';
                    style.textContent = `video { width: ${displayW}px !important; height: ${screenH}px !important; position: absolute !important; top: 0 !important; left: ${leftOffset}px !important; object-fit: fill !important; }`;
                    cmp.shadowRoot.appendChild(style);
                }
            }
        }

        setInterval(fixPortraitVideo, 500);

        // 7. Receiver эхлүүлэх
        const options = new cast.framework.CastReceiverOptions();
        // Автоматаар дараагийн видео руу шилжих тохиргоо
        options.autoNextConfig = new cast.framework.ui.AutoNextConfig();
        options.autoNextConfig.timeout = 3;

        context.start(options);
        console.log('[RECEIVER] Started with Options');
    </script>
</body>

</html>
