<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Portrait Video Receiver</title>
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>

    <style type="text/css">
        html,
        body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            background-color: black;
            overflow: hidden;
        }

        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        /* 1. Official CAF Player Element */
        cast-media-player {
            width: 100%;
            height: 100%;
            --player-background-color: transparent;
            z-index: 2;
        }

        /* 2. Force the internal video tag to NOT stretch */
        /* Note: CAF puts the video tag in a shadow DOM, 
           so we target it globally with !important */
        video {
            object-fit: contain !important;
            width: 100% !important;
            height: 100% !important;
        }

        /* 3. Optional: The "Blurred Wings" effect for portrait videos */
        #background-blur {
            position: absolute;
            top: -5%;
            left: -5%;
            width: 110%;
            height: 110%;
            background-size: cover;
            background-position: center;
            filter: blur(40px) brightness(0.3);
            z-index: 1;
            transition: background-image 0.8s ease-in-out;
        }

        /* Add this to your <style> block */
        cast-media-player::part(video) {
            object-fit: contain !important;
        }

        /* This is the standard backup */
        video {
            object-fit: contain !important;
        }
    </style>
</head>

<body>
    <div id="container">
        <div id="background-blur"></div>
        <cast-media-player></cast-media-player>
    </div>

    <script>
        const context = cast.framework.CastReceiverContext.getInstance();
        const playerManager = context.getPlayerManager();
        const bgBlur = document.getElementById('background-blur');

        // --- Helper to find the video element inside Shadow DOM ---
        function getInternalVideo() {
            // 1. Try standard query
            let v = document.querySelector('video');
            // 2. If not found, look inside the cast-media-player shadow root
            if (!v) {
                const player = document.querySelector('cast-media-player');
                if (player && player.shadowRoot) {
                    v = player.shadowRoot.querySelector('video');
                }
            }
            return v;
        }

        playerManager.setMessageInterceptor(
            cast.framework.messages.MessageType.LOAD,
            loadRequestData => {
                if (loadRequestData.media && loadRequestData.media.metadata) {
                    const images = loadRequestData.media.metadata.images;
                    if (images && images.length > 0) {
                        bgBlur.style.backgroundImage = `url(${images[0].url})`;
                    }
                }
                return loadRequestData;
            }
        );

        // --- The "Anti-Stretch" Logic ---
        playerManager.addEventListener(
            cast.framework.events.EventType.PLAYER_STATE_CHANGED,
            event => {
                if (event.playerState === 'PLAYING' || event.playerState === 'BUFFERING') {
                    const videoElement = getInternalVideo();
                    if (videoElement) {
                        videoElement.style.setProperty('object-fit', 'contain', 'important');
                        videoElement.style.setProperty('width', '100vw', 'important');
                        videoElement.style.setProperty('height', '100vh', 'important');
                    }
                }
            }
        );

        context.start();
    </script>
</body>

</html>
