<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: black;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        #media-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: black;
            z-index: 0;
        }

        #my-video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: black;
        }

        cast-media-player {
            width: 100vw;
            height: 100vh;
            --theme-hue: 0;
            --progress-color: white;
            --splash-image: none;
            position: relative;
            z-index: 1;
        }
    </style>
</head>

<body>
    <div id="media-container">
        <video id="my-video"></video>
    </div>
    <cast-media-player></cast-media-player>

    <script>
        const context = cast.framework.CastReceiverContext.getInstance();
        const playerManager = context.getPlayerManager();

        // Use our own video element so we have full control over styling
        const myVideo = document.getElementById('my-video');
        const castPlayer = document.querySelector('cast-media-player');
        castPlayer.setMediaElement(myVideo);

        playerManager.addEventListener(
            cast.framework.events.EventType.MEDIA_STATUS,
            (event) => {
                console.log('MEDIA STATUS:', event);
            }
        );

        context.start();
    </script>
</body>

</html>
