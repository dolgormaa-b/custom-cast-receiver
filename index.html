<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100vw;
            height: 100vh;
            background: black;
            overflow: hidden;
        }

        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: black;
        }

        #bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            filter: blur(40px) brightness(0.3);
            transform: scale(1.2);
            z-index: 0;
        }

        cast-media-player {
            display: block;
            position: relative;
            z-index: 1;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>

<body>
    <div id="container">
        <div id="bg"></div>
        <cast-media-player></cast-media-player>
    </div>

    <script>
        const context = cast.framework.CastReceiverContext.getInstance();
        const playerManager = context.getPlayerManager();

        // ✅ Inject styles into shadow DOM
        function injectShadowStyles() {
            const player = document.querySelector('cast-media-player');
            if (!player || !player.shadowRoot) {
                setTimeout(injectShadowStyles, 100);
                return;
            }

            const style = document.createElement('style');
            style.textContent = `
                #playerContainer,
                .playerContainer,
                video,
                .video {
                    width: 100vw !important;
                    height: 100vh !important;
                    object-fit: contain !important;
                    background: transparent !important;
                }

                /* hide default controls */
                .controls {
                    display: none !important;
                }
            `;
            player.shadowRoot.appendChild(style);
            console.log('✅ Shadow styles injected');
        }

        // ✅ Set thumbnail as blurred background
        playerManager.addEventListener(
            cast.framework.events.EventType.PLAYER_LOADING,
            () => {
                const media = playerManager.getMediaInformation();
                if (media?.metadata?.images?.[0]?.url) {
                    document.getElementById('bg').style.backgroundImage =
                        `url(${media.metadata.images[0].url})`;
                }
                injectShadowStyles();
            }
        );

        // inject on load too
        window.addEventListener('load', injectShadowStyles);

        context.start();

        // retry injection after context starts
        setTimeout(injectShadowStyles, 500);
        setTimeout(injectShadowStyles, 1000);
        setTimeout(injectShadowStyles, 2000);
    </script>
</body>

</html>
