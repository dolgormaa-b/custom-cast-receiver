<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100vw;
            height: 100vh;
            background: black;
            overflow: hidden;
        }

        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        /* 🔥 Blurred background */
        #bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            filter: blur(40px) brightness(0.35);
            transform: scale(1.2);
            z-index: 0;
        }

        /* ✅ Video (NO STRETCH EVER) */
        video {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);

            max-width: 100vw;
            max-height: 100vh;

            width: auto;
            height: auto;

            object-fit: contain;
            background: transparent;
            z-index: 1;
        }
    </style>
</head>

<body>
    <div id="container">
        <div id="bg"></div>
        <video id="video" autoplay playsinline></video>
    </div>

    <script>
        const context = cast.framework.CastReceiverContext.getInstance();
        const playerManager = context.getPlayerManager();
        const video = document.getElementById('video');
        const bg = document.getElementById('bg');

        // ✅ Attach custom video element
        playerManager.setMediaElement(video);

        // 🔥 FORCE correct aspect ratio behavior
        playerManager.setMessageInterceptor(
            cast.framework.messages.MessageType.LOAD,
            request => {
                console.log('📥 LOAD REQUEST:', request);

                // Ensure metadata exists
                request.media = request.media || {};

                // Prevent CAF weird scaling
                request.customData = request.customData || {};
                request.customData.enforceAspectRatio = true;

                return request;
            }
        );

        // 🎬 When media starts loading
        playerManager.addEventListener(
            cast.framework.events.EventType.PLAYER_LOADING,
            () => {
                const media = playerManager.getMediaInformation();
                console.log('🎬 Loading:', media);

                // Set blurred background if thumbnail exists
                const imageUrl = media?.metadata?.images?.[0]?.url;

                if (imageUrl) {
                    bg.style.backgroundImage = `url(${imageUrl})`;
                } else {
                    bg.style.background = 'black';
                }
            }
        );

        // ✅ After video is ready → enforce layout again
        playerManager.addEventListener(
            cast.framework.events.EventType.PLAYER_LOAD_COMPLETE,
            () => {
                console.log('✅ Load complete');

                video.style.objectFit = 'contain';
                video.style.width = 'auto';
                video.style.height = 'auto';
                video.style.maxWidth = '100vw';
                video.style.maxHeight = '100vh';
            }
        );

        // Optional debug
        playerManager.addEventListener(
            cast.framework.events.EventType.ERROR,
            (e) => console.error('❌ Error:', e)
        );

        context.start({
            disableIdleTimeout: true
        });

        console.log('🚀 Custom Receiver Started');
    </script>
</body>

</html>
