<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: black;
            overflow: hidden;
        }

        cast-media-player {
            width: 100vw;
            height: 100vh;
            --progress-color: white;
            --splash-image: none;

        }


        video::cue {
            background: rgba(0, 0, 0, 0.6) !important;
            color: white !important;
            font-size: 20px !important;
        }
    </style>
</head>

<body>
    <cast-media-player></cast-media-player>

    <script>
        const context = cast.framework.CastReceiverContext.getInstance();
        const playerManager = context.getPlayerManager();

        function findVideo() {
            const cmp = document.querySelector('cast-media-player');
            if (cmp && cmp.shadowRoot) {
                return cmp.shadowRoot.querySelector('video') || document.querySelector('video');
            }
            return document.querySelector('video');
        }

        function clearSubtitles() {
            const video = findVideo();
            if (!video) return;
            const oldTracks = video.querySelectorAll('track');
            oldTracks.forEach(t => t.remove());
            if (video.textTracks) {
                for (let i = 0; i < video.textTracks.length; i++) {
                    video.textTracks[i].mode = 'disabled';
                }
            }
        }


        function setupVideoListeners() {
            const video = findVideo();
            if (!video || video.hasAttribute('listener-added')) return;

            video.setAttribute('listener-added', 'true');

            video.onended = function () {

                // playerManager.stop();

                playerManager.broadcastStatus(true);
            };

        }

        function enableSubtitles() {
            const media = playerManager.getMediaInformation();
            // log('[SUBS] media tracks: ' + JSON.stringify(media?.tracks));
            // log('[SUBS] activeTrackIds: ' + JSON.stringify(media?.activeTrackIds));

            if (media?.tracks?.length > 0) {
                const textTrack = media.tracks.find(t => t.type === 'TEXT');
                if (textTrack) {
                    playerManager.setActiveTrackIds([textTrack.trackId]);
                    // log('[SUBS] Set active: ' + textTrack.trackId);
                } else {
                    // log('[SUBS] No TEXT track found');
                }
            } else {
                // log('[SUBS] No tracks at all');
            }
        }


        playerManager.setMessageInterceptor(
            cast.framework.messages.MessageType.LOAD,
            request => {
                return request;
            }
        );

        let isPortrait = false;
        let fixInterval = null;

        function fixPortraitVideo() {
            const video = findVideo();
            if (!video) return;

            const vw = video.videoWidth;
            const vh = video.videoHeight;
            if (!vw || !vh) return;

            if (vh > vw) {
                isPortrait = true;
                const screenW = window.innerWidth || 1920;
                const screenH = window.innerHeight || 1080;
                const ratio = vw / vh;
                const displayH = screenH;
                const displayW = Math.round(screenH * ratio);
                const leftOffset = Math.round((screenW - displayW) / 2);

                video.style.setProperty('width', displayW + 'px', 'important');
                video.style.setProperty('height', displayH + 'px', 'important');
                video.style.setProperty('position', 'absolute', 'important');
                video.style.setProperty('top', '0px', 'important');
                video.style.setProperty('left', leftOffset + 'px', 'important');
                video.style.setProperty('object-fit', 'fill', 'important');

                const cmp = document.querySelector('cast-media-player');
                if (cmp && cmp.shadowRoot && !cmp.shadowRoot.querySelector('#portrait-fix')) {
                    const style = document.createElement('style');
                    style.id = 'portrait-fix';
                    style.textContent = 'video { width: ' + displayW + 'px !important; height: ' + displayH + 'px !important; position: absolute !important; top: 0 !important; left: ' + leftOffset + 'px !important; object-fit: fill !important; }';
                    cmp.shadowRoot.appendChild(style);
                }
            } else {
                isPortrait = false;
            }
        }

        fixInterval = setInterval(fixPortraitVideo, 200);

        playerManager.setMessageInterceptor(
            cast.framework.messages.MessageType.LOAD,
            request => {
                const video = findVideo();
                if (video && video.textTracks) {
                    for (let i = 0; i < video.textTracks.length; i++) {
                        video.textTracks[i].mode = 'disabled';
                    }
                }
                request.autoplay = true;
                return request;
            }
        );

        playerManager.addEventListener(
            cast.framework.events.EventType.PLAYER_LOAD_COMPLETE,
            () => {

                // const video = findVideo();
                // if (video) {
                //     const oldTracks = video.querySelectorAll('track');
                //     if (oldTracks) {
                //         oldTracks.forEach(t => t.remove());

                //         if (video.textTracks) {
                //             for (let i = 0; i < video.textTracks.length; i++) {
                //                 video.textTracks[i].mode = 'disabled';
                //             }
                //         }
                //     }
                // }

                const cmp = document.querySelector('cast-media-player');
                if (cmp && cmp.shadowRoot) {
                    const oldFix = cmp.shadowRoot.querySelector('#portrait-fix');
                    if (oldFix) oldFix.remove();
                }

                setupVideoListeners();
                fixPortraitVideo();
                // enableSubtitles();
                setTimeout(() => enableSubtitles(), 500);
            }
        );

        function log(msg) {
            const div = document.getElementById('debug') || (() => {
                const d = document.createElement('div');
                d.id = 'debug';
                d.style.cssText = 'position:fixed;top:10px;left:10px;color:lime;font-size:20px;z-index:99999;background:rgba(0,0,0,0.7);padding:10px;max-width:800px;word-break:break-all;';
                document.body.appendChild(d);
                return d;
            })();
            div.innerHTML += msg + '<br>';
        }


        // playerManager.addEventListener(cast.framework.events.EventType.SEEKED, () => {
        //     const activeIds = playerManager.getActiveTrackIds();
        //     if (activeIds && activeIds.length > 0) {
        //         playerManager.setActiveTrackIds([]);
        //         setTimeout(() => {
        //             playerManager.setActiveTrackIds(activeIds);
        //         }, 10);
        //     }
        // });

        playerManager.setSupportedMediaCommands(
            cast.framework.messages.Command.ALL_BASIC_MEDIA |
            cast.framework.messages.Command.QUEUE_NEXT |
            cast.framework.messages.Command.QUEUE_PREV
        );
        context.start();
    </script>
</body>

</html>
