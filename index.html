<!DOCTYPE html>
<html>

<head>
    <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: black;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        #container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Blurred background */
        #bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            filter: blur(30px) brightness(0.4);
            transform: scale(1.1);
        }

        /* Main video */
        cast-media-player {
            position: relative;
            z-index: 1;
            height: 100vh;
            width: auto;
        }
    </style>
</head>

<body>
    <div id="container">
        <div id="bg"></div>
        <cast-media-player></cast-media-player>
    </div>

    <script>
        const context = cast.framework.CastReceiverContext.getInstance();
        const playerManager = context.getPlayerManager();

        // Set thumbnail as blurred background
        playerManager.addEventListener(
            cast.framework.events.EventType.MEDIA_STATUS,
            (event) => {
                const media = playerManager.getMediaInformation();
                if (media && media.metadata && media.metadata.images && media.metadata.images.length > 0) {
                    document.getElementById('bg').style.backgroundImage =
                        `url(${media.metadata.images[0].url})`;
                }
            }
        );

        context.start();
    </script>
</body>

</html>
