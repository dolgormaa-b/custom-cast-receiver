<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: black;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        cast-media-player {
            width: 100vw;
            height: 100vh;
            --theme-hue: 0;
            --progress-color: white;
            --splash-image: none;
        }
    </style>
</head>

<body>
    <cast-media-player></cast-media-player>

    <script>
        const context = cast.framework.CastReceiverContext.getInstance();
        const playerManager = context.getPlayerManager();

        function forceContain(video) {
            if (video.style.objectFit !== 'contain') {
                video.style.setProperty('object-fit', 'contain', 'important');
                video.style.setProperty('background', 'black', 'important');
            }
        }

        function fixAllVideos() {
            document.querySelectorAll('video').forEach(forceContain);

            const cmp = document.querySelector('cast-media-player');
            if (cmp && cmp.shadowRoot) {
                cmp.shadowRoot.querySelectorAll('video').forEach(forceContain);
            }
        }

        // Only watch for NEW elements being added (not style changes)
        const observer = new MutationObserver(() => fixAllVideos());
        observer.observe(document.body, { childList: true, subtree: true });

        // Fix after media loads
        playerManager.addEventListener(
            cast.framework.events.EventType.PLAYER_LOAD_COMPLETE,
            () => {
                fixAllVideos();
                setTimeout(fixAllVideos, 1000);
                setTimeout(fixAllVideos, 3000);

                // Observe shadow DOM for new child elements only
                const cmp = document.querySelector('cast-media-player');
                if (cmp && cmp.shadowRoot) {
                    observer.observe(cmp.shadowRoot, { childList: true, subtree: true });
                }
            }
        );

        // Gentle periodic check every 5 seconds
        setInterval(fixAllVideos, 5000);

        context.start();
    </script>
</body>

</html>
