<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: black;
            overflow: hidden;
        }

        cast-media-player {
            width: 100vw;
            height: 100vh;
            --theme-hue: 0;
            --progress-color: white;
            background-color: black !important;
        }
    </style>
</head>

<body>
    <cast-media-player></cast-media-player>

    <script>
        const context = cast.framework.CastReceiverContext.getInstance();
        const playerManager = context.getPlayerManager();

        function findVideo() {
            const cmp = document.querySelector('cast-media-player');
            if (cmp && cmp.shadowRoot) {
                return cmp.shadowRoot.querySelector('video');
            }
            return document.querySelector('video');
        }

        function fixPortraitVideo() {
            const video = findVideo();
            if (!video) return;

            // Видеоны жинхэнэ хэмжээг авна
            const vw = video.videoWidth;
            const vh = video.videoHeight;

            // Хэрэв видео ачаалж дуусаагүй бол (0 бол) алгасна
            if (vw === 0 || vh === 0) return;

            // Зөвхөн босоо (Portrait) үед ажиллана
            if (vh > vw) {
                const screenW = window.innerWidth;
                const screenH = window.innerHeight;

                // Харьцааг тооцоолох (Жишээ нь: 720/1280 = 0.5625)
                const ratio = vw / vh;
                const displayH = screenH;
                const displayW = Math.round(screenH * ratio);
                const leftOffset = Math.round((screenW - displayW) / 2);

                // 1. Хүчээр Style-ыг нь тулгах (Inline style)
                video.style.setProperty('width', displayW + 'px', 'important');
                video.style.setProperty('height', displayH + 'px', 'important');
                video.style.setProperty('left', leftOffset + 'px', 'important');
                video.style.setProperty('position', 'absolute', 'important');
                video.style.setProperty('top', '0px', 'important');
                video.style.setProperty('object-fit', 'fill', 'important');

                // 2. Shadow DOM дотор Style tag нэг удаа нэмэх
                const cmp = document.querySelector('cast-media-player');
                if (cmp && cmp.shadowRoot && !cmp.shadowRoot.querySelector('#portrait-fix-style')) {
                    const style = document.createElement('style');
                    style.id = 'portrait-fix-style';
                    style.textContent = `
                        video { 
                            width: ${displayW}px !important; 
                            height: ${displayH}px !important; 
                            left: ${leftOffset}px !important; 
                            position: absolute !important; 
                            object-fit: fill !important; 
                        }
                    `;
                    cmp.shadowRoot.appendChild(style);
                }
            }
        }

        // 200ms тутамд видеоны хэмжээг "Цоожлох" (Lock)
        setInterval(fixPortraitVideo, 200);

        // Metadata ачаалагдах үед шууд нэг удаа ажиллуулах
        playerManager.addEventListener(
            cast.framework.events.EventType.METADATA_LOADED,
            fixPortraitVideo
        );

        context.start();
    </script>
</body>

</html>
