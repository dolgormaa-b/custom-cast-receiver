<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: black;
            overflow: hidden;
        }

        cast-media-player {
            width: 100vw;
            height: 100vh;
            --theme-hue: 0;
            --progress-color: white;
            --splash-image: none;
        }
    </style>
</head>

<body>
    <cast-media-player></cast-media-player>

    <script>
        const context = cast.framework.CastReceiverContext.getInstance();
        const playerManager = context.getPlayerManager();

        function findVideo() {
            const cmp = document.querySelector('cast-media-player');
            if (cmp && cmp.shadowRoot) {
                const v = cmp.shadowRoot.querySelector('video');
                if (v) return v;
            }
            return document.querySelector('video');
        }

        function fixPortraitVideo() {
            const video = findVideo();
            if (!video) {
                console.log('[FIX] No video element found');
                return;
            }

            const vw = video.videoWidth;
            const vh = video.videoHeight;
            console.log('[FIX] Video dimensions: ' + vw + 'x' + vh);

            if (!vw || !vh) return;

            // Portrait video detected (taller than wide)
            if (vh > vw) {
                const screenW = window.innerWidth || 1920;
                const screenH = window.innerHeight || 1080;
                const ratio = vw / vh;
                const displayH = screenH;
                const displayW = Math.round(screenH * ratio);
                const leftOffset = Math.round((screenW - displayW) / 2);

                video.style.width = displayW + 'px';
                video.style.height = displayH + 'px';
                video.style.position = 'absolute';
                video.style.top = '0';
                video.style.left = leftOffset + 'px';
                video.style.objectFit = 'fill';
                console.log('[FIX] Portrait -> ' + displayW + 'x' + displayH + ' left:' + leftOffset);
            } else {
                // Landscape video — reset any overrides
                video.style.width = '100%';
                video.style.height = '100%';
                video.style.position = '';
                video.style.top = '';
                video.style.left = '';
                video.style.objectFit = '';
                console.log('[FIX] Landscape — using default sizing');
            }
        }

        // Fix AFTER media is fully loaded and playing
        playerManager.addEventListener(
            cast.framework.events.EventType.PLAYING,
            () => {
                console.log('[EVENT] PLAYING');
                setTimeout(fixPortraitVideo, 300);
                setTimeout(fixPortraitVideo, 1500);
                setTimeout(fixPortraitVideo, 3000);
            }
        );

        playerManager.addEventListener(
            cast.framework.events.EventType.PLAYER_LOAD_COMPLETE,
            () => {
                console.log('[EVENT] PLAYER_LOAD_COMPLETE');
                setTimeout(fixPortraitVideo, 1000);
                setTimeout(fixPortraitVideo, 3000);
            }
        );

        // Start the receiver — this must succeed for anything to work
        context.start();
        console.log('[RECEIVER] Started');
    </script>
</body>

</html>
