<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100vw;
            height: 100vh;
            background: black;
            overflow: hidden;
        }

        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: black;
        }

        #bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            filter: blur(40px) brightness(0.3);
            transform: scale(1.2);
            z-index: 0;
        }

        cast-media-player {
            display: block;
            position: relative;
            z-index: 1;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>

<body>
    <div id="container">
        <div id="bg"></div>
        <cast-media-player></cast-media-player>
    </div>

    <script>
        const context = cast.framework.CastReceiverContext.getInstance();
        const playerManager = context.getPlayerManager();

        // ✅ Find and fix the actual video element inside shadow DOM
        function fixVideoElement() {
            const player = document.querySelector('cast-media-player');
            if (!player || !player.shadowRoot) {
                setTimeout(fixVideoElement, 100);
                return;
            }

            // ✅ Find the actual <video> tag
            const video = player.shadowRoot.querySelector('video');
            if (!video) {
                setTimeout(fixVideoElement, 100);
                return;
            }

            console.log('✅ Found video element:', video);

            // ✅ Apply styles directly to video element
            video.style.objectFit = 'contain';
            video.style.width = '100vw';
            video.style.height = '100vh';
            video.style.position = 'absolute';
            video.style.top = '0';
            video.style.left = '0';
            video.style.background = 'transparent';

            console.log('✅ Video styles applied');
        }

        playerManager.addEventListener(
            cast.framework.events.EventType.PLAYER_LOADING,
            () => {
                const media = playerManager.getMediaInformation();
                if (media?.metadata?.images?.[0]?.url) {
                    document.getElementById('bg').style.backgroundImage =
                        `url(${media.metadata.images[0].url})`;
                }
                fixVideoElement();
            }
        );

        window.addEventListener('load', () => {
            fixVideoElement();
        });

        context.start();

        // ✅ Multiple retries
        setTimeout(fixVideoElement, 500);
        setTimeout(fixVideoElement, 1000);
        setTimeout(fixVideoElement, 2000);
        setTimeout(fixVideoElement, 3000);
    </script>
</body>

</html>
