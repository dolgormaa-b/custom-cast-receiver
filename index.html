<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: black;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        cast-media-player {
            width: 100vw;
            height: 100vh;
            --theme-hue: 0;
            --progress-color: white;
            --splash-image: none;
        }
    </style>
</head>

<body>
    <cast-media-player></cast-media-player>

    <script>
        const context = cast.framework.CastReceiverContext.getInstance();
        const playerManager = context.getPlayerManager();

        /**
         * Aggressively enforce object-fit:contain on ALL video elements,
         * including those inside shadow DOMs. Uses MutationObserver to
         * re-apply whenever the Cast SDK changes styles.
         */
        function forceContain(video) {
            video.style.setProperty('object-fit', 'contain', 'important');
            video.style.setProperty('background', 'black', 'important');
        }

        function findAndFixVideos() {
            // Fix videos in the light DOM
            document.querySelectorAll('video').forEach(forceContain);

            // Fix videos inside cast-media-player shadow DOM
            const cmp = document.querySelector('cast-media-player');
            if (cmp && cmp.shadowRoot) {
                cmp.shadowRoot.querySelectorAll('video').forEach(forceContain);

                // Also look for nested shadow DOMs (the SDK nests components)
                cmp.shadowRoot.querySelectorAll('*').forEach(el => {
                    if (el.shadowRoot) {
                        el.shadowRoot.querySelectorAll('video').forEach(forceContain);
                    }
                });
            }
        }

        // Watch for any DOM changes and re-apply fix
        const observer = new MutationObserver(() => {
            findAndFixVideos();
        });

        observer.observe(document.body, {
            childList: true,
            subtree: true,
            attributes: true,
            attributeFilter: ['style']
        });

        // Also observe the shadow DOM when it becomes available
        function observeShadow() {
            const cmp = document.querySelector('cast-media-player');
            if (cmp && cmp.shadowRoot) {
                observer.observe(cmp.shadowRoot, {
                    childList: true,
                    subtree: true,
                    attributes: true,
                    attributeFilter: ['style']
                });

                // Observe nested shadow roots
                cmp.shadowRoot.querySelectorAll('*').forEach(el => {
                    if (el.shadowRoot) {
                        observer.observe(el.shadowRoot, {
                            childList: true,
                            subtree: true,
                            attributes: true,
                            attributeFilter: ['style']
                        });
                    }
                });
            }
        }

        // Apply on media load and periodically
        playerManager.addEventListener(
            cast.framework.events.EventType.PLAYER_LOAD_COMPLETE,
            () => {
                findAndFixVideos();
                observeShadow();
            }
        );

        // Periodic enforcement as a safety net (every 2 seconds)
        setInterval(() => {
            findAndFixVideos();
            observeShadow();
        }, 2000);

        // Initial run
        findAndFixVideos();
        observeShadow();

        context.start();
    </script>
</body>

</html>
